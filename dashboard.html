<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Psicologia e Migração</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --purple: #4A3F8F; --bg: #FAFAF8; --border: #E2DFF5; --text: #1A1830; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'DM Sans', sans-serif; }
  body { background: var(--bg); color: var(--text); padding: 2rem; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
  .header h1 { color: var(--purple); font-size: 1.5rem; }
  .filters { display: flex; gap: 1rem; margin-bottom: 1rem; }
  select { padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; outline: none; }
  .table-wrap { overflow-x: auto; background: #FFF; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 2rem; }
  table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
  th, td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: top; }
  th { background: var(--purple); color: #FFF; font-weight: 500; }
  tr:hover { background: #F0EEFF; }
  .loading { text-align: center; padding: 2rem; color: var(--purple); font-weight: bold; }
  .section-title { font-size: 1.2rem; color: var(--purple); margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="header">
  <h1>Dashboard de Respostas</h1>
  <div id="count">Total: 0</div>
</div>

<div class="filters">
  <select id="filterVinculo" onchange="renderTable()">
    <option value="Todos">Todos os Vínculos</option>
    <option value="Estudante de Graduação em Psicologia">Graduação</option>
    <option value="Estudante de Pós-Graduação">Pós-Graduação</option>
    <option value="Profissional formado(a) em Psicologia (com CRP ativo)">Profissional</option>
  </select>
  <select id="filterRoda" onchange="renderTable()">
    <option value="Todos">Interesse na Roda?</option>
    <option value="Sim">Sim</option>
    <option value="Não">Não</option>
  </select>
</div>

<div class="table-wrap">
  <div id="loading" class="loading">Carregando dados...</div>
  <table id="dataTable" style="display:none;">
    <thead>
      <tr>
        <th>Vínculo</th>
        <th>Residência</th>
        <th>Área</th>
        <th>Referencial Teórico</th>
        <th>Roda de Conversa</th>
        <th>E-mail</th>
        <th>Disponibilidade</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<h2 class="section-title">Mapa de Disponibilidade (Roda de Conversa)</h2>
<div class="table-wrap">
  <table id="availTable" style="display:none;">
    <thead>
      <tr>
        <th>Período</th>
        <th>Segunda</th>
        <th>Terça</th>
        <th>Quarta</th>
        <th>Quinta</th>
        <th>Sexta</th>
        <th>Sábado</th>
      </tr>
    </thead>
    <tbody id="availBody"></tbody>
  </table>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwmFM3ZIvswEtNyYEWSp6qdSOkoCPgo7TmTXWWNBD38IrjdwfpvRddlIs2tF97HhwjdBQ/exec';

let allData = [];

// Busca dados
async function fetchData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error(`Erro: ${res.status}`);
    
    allData = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dataTable').style.display = 'table';
    document.getElementById('availTable').style.display = 'table';
    renderTable();
  } catch (e) {
    document.getElementById('loading').innerHTML = `Erro ao carregar dados.<br><small>${e.message}</small>`;
  }
}

// Formata texto
const formatText = (text) => text ? String(text).replace(/,/g, '<br>') : '';

// Renderiza tabela principal
function renderTable() {
  const filterV = document.getElementById('filterVinculo').value;
  const filterR = document.getElementById('filterRoda').value;
  const tbody = document.getElementById('tableBody');
  
  let filtered = allData.filter(row => {
    const matchV = filterV === 'Todos' || (row['Vínculo'] && row['Vínculo'].includes(filterV));
    const matchR = filterR === 'Todos' || row['Roda de Conversa'] === filterR;
    return matchV && matchR;
  });

  document.getElementById('count').innerText = `Total: ${filtered.length}`;
  tbody.innerHTML = '';

  filtered.forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${formatText(row['Vínculo'])}</td>
      <td>${formatText(row['País de Residência Atual'])}</td>
      <td>${formatText(row['Área(s) de Atuação/Interesse'])}</td>
      <td>${formatText(row['Referencial Teórico'])}</td>
      <td>${formatText(row['Roda de Conversa'])}</td>
      <td>${formatText(row['E-mail (roda)'])}</td>
      <td>${formatText(row['Disponibilidade (roda)'])}</td>
    `;
    tbody.appendChild(tr);
  });

  renderAvailTable(filtered);
}

// Renderiza grid de disponibilidade
function renderAvailTable(data) {
  const days = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
  const periods = ['Manhã', 'Tarde', 'Noite'];
  const grid = { 'Manhã': {}, 'Tarde': {}, 'Noite': {} };

  // Inicializa matriz
  periods.forEach(p => days.forEach(d => grid[p][d] = []));

  // Popula e-mails
  data.forEach(row => {
    if (row['Roda de Conversa'] === 'Sim' && row['E-mail (roda)'] && row['Disponibilidade (roda)']) {
      const disp = row['Disponibilidade (roda)'].split(',');
      disp.forEach(item => {
        const parts = item.split('-');
        if (parts.length === 2) {
          const d = parts[0].trim();
          const p = parts[1].trim();
          if (grid[p] && grid[p][d]) grid[p][d].push(row['E-mail (roda)']);
        }
      });
    }
  });

  // Monta HTML
  const tbody = document.getElementById('availBody');
  tbody.innerHTML = '';
  periods.forEach(p => {
    let tr = `<tr><td><strong>${p}</strong></td>`;
    days.forEach(d => {
      tr += `<td>${grid[p][d].join('<br><br>')}</td>`;
    });
    tr += `</tr>`;
    tbody.innerHTML += tr;
  });
}

fetchData();
</script>
</body>
</html>
